name: zp
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.11.0


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  
  sqflite: ^2.4.2          # Основная библиотека работы с SQLite
  path: ^1.9.0             # Для join() при построении пути к файлу БД
  
  intl: ^0.20.2            # DateFormat, локаль 'ru_RU'
  shared_preferences: ^2.3.3
  mask_text_input_formatter: ^2.9.0
  pdf: ^3.11.1          # генерация PDF
  printing: ^5.13.1     # просмотр, печать, отправка PDF
  docx_template: ^0.5.1 # генерация DOCX по шаблону
  path_provider: ^2.1.4 # временные папки устройства
  open_filex: ^4.5.0    # открытие файла на устройстве
  share_plus: ^10.0.2   # отправка по почте/мессенджерам

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


flutter:


  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/templates/trudovoy_dogovor.docx

    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf
    - assets/fonts/Roboto-Italic.ttf

  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package


